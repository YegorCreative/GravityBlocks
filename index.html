<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GravityBlocks</title>
  <meta name="description" content="GravityBlocks is a fast, browser-based falling blocks game with smooth controls, score chasing, power-ups, and mobile-friendly gameplay." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <link rel="canonical" href="https://yegorcreative.github.io/GravityBlocks/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="GravityBlocks" />
  <meta property="og:description" content="Play GravityBlocks in your browser. Stack smart, clear lines, and climb the high score." />
  <meta property="og:url" content="https://yegorcreative.github.io/GravityBlocks/" />
  <meta property="og:site_name" content="GravityBlocks" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="GravityBlocks" />
  <meta name="twitter:description" content="Play GravityBlocks in your browser. Stack smart, clear lines, and climb the high score." />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="GravityBlocks" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <!-- Intro Splash Screen -->
  <div id="introSplash" class="intro-splash">
    <div class="intro-content">
      <div class="falling-blocks" id="fallingBlocks"></div>
      <div class="intro-logo">
        <h1 class="title-glitch" data-text="GravityBlocks">GravityBlocks</h1>
        <p class="tagline">Master the falling blocks</p>
      </div>
      <button id="playBtn" class="play-btn" type="button">
        <span class="play-icon">▶</span>
        <span class="play-text">Play Game</span>
      </button>
      <div class="intro-footer">
        <p>Arrows to move • Space to drop • C to Hold • P to Pause</p>
      </div>
    </div>
  </div>

  <header>
    <h1>GravityBlocks</h1>
  </header>

  <main class="game-wrapper">
    <div class="board">
      <div id="stage" aria-label="Scaled stage">
        <div class="stage-ui" aria-hidden="false">
          <div class="hud-top">
            <div class="hud-item">
              <span class="label">SCORE</span>
              <span class="value" id="score">0</span>
            </div>
            <div class="hud-item">
              <span class="label">LEVEL</span>
              <span class="value" id="level">1</span>
            </div>
            <div class="hud-item">
              <span class="label">LINES</span>
              <span class="value" id="lines">0</span>
            </div>
          </div>
          <div class="hud-side left">
            <div class="side-panel">
              <span class="label">HOLD</span>
              <canvas id="holdCanvas" width="64" height="64" aria-label="Hold piece preview"></canvas>
            </div>
          </div>
          <div class="hud-side right">
            <div class="side-panel">
              <span class="label">NEXT</span>
              <div id="nextQueue" class="next-queue" aria-label="Upcoming pieces"></div>
            </div>
          </div>
        </div>
        <canvas id="gameBoard" aria-label="GravityBlocks canvas"></canvas>
      </div>
    </div>
    <aside class="hud">
      <div class="stat">
        <span class="label">High Score</span>
        <span class="value" id="highScore">0</span>
      </div>
      <div class="stat">
        <span class="label">Power</span>
        <div class="power" aria-label="Power meter">
          <div class="bar" id="powerBar" style="width:0%"></div>
        </div>
        <div class="power-meta">
          <span class="label">Bombs:</span>
          <span class="value" id="bombs">0</span>
        </div>
      </div>
      <button id="bombBtn" type="button" aria-label="Use Bomb">Bomb Row</button>
      <button id="pauseBtn" type="button">Pause</button>
      <button id="settingsBtn" type="button">Settings</button>
      <button id="speedBtn" type="button">Speed: 1x</button>
      <button id="restartBtn" type="button">Restart</button>
    </aside>
  </main>

  <div class="mobile-controls" aria-label="Mobile controls">
    <div class="grid">
      <button class="btn" id="btn-left" type="button">Left</button>
      <button class="btn" id="btn-rotate" type="button">Rotate</button>
      <button class="btn" id="btn-right" type="button">Right</button>
      <button class="btn" id="btn-soft" type="button">Down</button>
      <button class="btn" id="btn-hard" type="button">Drop</button>
      <button class="btn" id="btn-bomb" type="button">Bomb</button>
    </div>
  </div>

  <div id="pauseOverlay" hidden aria-hidden="true">
    <div class="overlay-inner">
      <h2>Paused</h2>
      <p>Press P or Resume to continue.</p>
      <button id="resumeBtn" type="button">Resume</button>
    </div>
  </div>
  <div id="settingsPanel" hidden aria-hidden="true">
    <div class="overlay-inner">
      <h2>Settings</h2>
      <label class="toggle"><input type="checkbox" id="toggleGhost" checked /> Ghost Piece</label>
      <label class="toggle"><input type="checkbox" id="toggleSound" checked /> Sound Effects</label>
      <label class="toggle"><input type="checkbox" id="toggleGrid" checked /> Grid Background</label>
      <button id="closeSettings" type="button">Close</button>
    </div>
  </div>

  <script src="js/platform/storage.js"></script>
  <script src="js/platform/viewport.js"></script>
  <script src="js/platform/audio.js"></script>
  <script src="js/ui/hud.js"></script>
  <script src="js/render/board.js"></script>
  <script src="js/render/previews.js"></script>
  <script src="js/core/pieces.js"></script>
  <script src="js/core/scoring.js"></script>
  <script src="js/game.js"></script>
</body>

</html>
